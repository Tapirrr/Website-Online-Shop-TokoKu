<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keranjang - TokoKu</title>
  <link rel="stylesheet" href="../src/output.css">
</head>
<body class="bg-[#F9F9FC]">

<nav class="bg-[#134cbd] w-full z-20 top-0 border-b-2 sticky top-0 z-40">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

      <button onclick="navigate('homepage')" class="cursor-pointer flex items-center space-x-3 rtl:space-x-reverse">
        <img src="../assets/Gemini_Generated_Image_x6c4c1x6c4c1x6c4-removebg-preview (2).png" class="h-7" alt="" />
        <p class="h-7 font-bold self-center text-xl text-white font-semibold whitespace-nowrap">Toko<span class="text-white">Ku</span></p>
      </button>


    <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse gap-3">

     <button onclick="window.location.href='cart.html'" class="relative cursor-pointer">
  <span class="icon-[mdi--cart-outline] mt-[5px] w-[24px] h-[24px] bg-white"></span>
  <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
</button>

      <!-- Tampil saat BELUM login -->
      <a id="btn-login" href="login.html"
         class="text-white bg-[#4270ca] hover:bg-white/30 font-medium rounded-base text-sm px-4 py-2 transition">
        Login
      </a>

      <!-- Tampil saat SUDAH login (hidden by default) -->
      <a id="btn-profile" href="profile.html"
         class="hidden flex text-sm bg-neutral-primary rounded-full md:me-0 focus:ring-4 focus:ring-neutral-tertiary">
        <span class="sr-only">Open user profile</span>
        <img class="w-8 h-8 rounded-full"
             src="../assets/ChatGPT Image May 29, 2026, 08_00_37 AM.png"
             alt="user photo">
      </a>

    </div>
  </div>
</nav>

<div class="max-w-4xl mx-auto px-6 py-10">
  <h1 class="text-xl font-semibold text-gray-800 mb-6">Keranjang Belanja</h1>

  <div class="flex flex-col lg:flex-row gap-6">

    <!-- List Item -->
    <div id="cart-items" class="flex flex-col gap-4 flex-grow">
      <p class="text-gray-400 text-sm text-center mt-10">Keranjang kosong</p>
    </div>

    <!-- Summary -->
    <div class="w-full lg:w-72 shrink-0">
      <div class="bg-white border border-gray-100 rounded-2xl p-5 flex flex-col gap-4 sticky top-24">
        <h2 class="text-sm font-semibold text-gray-800">Ringkasan Belanja</h2>
        
        <div class="flex justify-between text-sm text-gray-500">
          <span>Total Item</span>
          <span id="total-item">0 item</span>
        </div>

        <div class="flex justify-between text-sm font-semibold text-gray-800 border-t border-gray-100 pt-3">
          <span>Total Harga</span>
          <span id="cart-total">Rp0</span>
        </div>

        <button onclick="checkout()" class="w-full bg-blue-600 hover:bg-blue-700 active:scale-[0.98] transition-all text-white text-sm font-medium rounded-xl py-3">
          Checkout
        </button>

        <button onclick="window.location.href='homepage.html'" class="w-full border border-gray-200 hover:bg-gray-50 text-gray-600 text-sm font-medium rounded-xl py-3 transition">
          Lanjut Belanja
        </button>
      </div>
    </div>

  </div>
</div>

<script src="../script/cart.js"></script>
</body>
</html>
