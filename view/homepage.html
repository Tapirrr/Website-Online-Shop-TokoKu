<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../src/output.css">
</head>
<body class="bg-[#F9F9FC]">
  
  

<nav class="bg-[#134cbd] w-full z-20 top-0 border-b-2 sticky top-0 z-40">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto p-4">

      <button onclick="navigate('homepage')" class="cursor-pointer flex items-center space-x-3 rtl:space-x-reverse">
        <img src="../assets/Gemini_Generated_Image_x6c4c1x6c4c1x6c4-removebg-preview (2).png" class="h-7" alt="" />
        <p class="h-7 font-bold self-center text-xl text-white font-semibold whitespace-nowrap">Toko<span class="text-white">Ku</span></p>
      </button>


    <div class="flex items-center md:order-2 space-x-3 md:space-x-0 rtl:space-x-reverse gap-3">

       <button onclick="window.location.href='cart.html'" class="relative cursor-pointer">
  <span class="icon-[mdi--cart-outline] mt-[5px] w-[24px] h-[24px] bg-white"></span>
  <span id="cart-badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center">0</span>
</button>
      <!-- Tampil saat BELUM login -->
      <a id="btn-login" href="login.html"
         class="text-white bg-[#4270ca] hover:bg-white/30 font-medium rounded-base text-sm px-4 py-2 transition">
        Login
      </a>

      <!-- Tampil saat SUDAH login (hidden by default) -->
      <a id="btn-profile" href="profile.html"
         class="hidden flex text-sm bg-neutral-primary rounded-full md:me-0 focus:ring-4 focus:ring-neutral-tertiary">
        <span class="sr-only">Open user profile</span>
        <img id="nav-profile-img"
        class="w-8 h-8 rounded-full"
             src=""
             alt="user photo">
      </a>

    </div>

    <form class="max-w-md mx-auto">
      <label for="search" class="block mb-2.5 text-sm font-medium text-heading sr-only">Search</label>
      <div class="relative">
        <div class="absolute inset-y-0 start-0 flex items-center ps-3 pointer-events-none">
          <svg class="w-4 h-4 text-body" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
            <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="m21 21-3.5-3.5M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"/>
          </svg>
        </div>
        <input type="search" id="search" class="block w-full p-3 ps-9 bg-neutral-secondary-medium border border-default-medium text-heading text-sm rounded-base focus:ring-brand focus:border-brand shadow-xs placeholder:text-body" placeholder="Search" required />
        <button type="button" onclick="searchProduk()" class="cursor-pointer absolute end-1.5 bottom-1.5 text-white bg-[#4270ca] hover:bg-[#134cbd] box-border border border-transparent focus:ring-4 focus:ring-brand-medium shadow-xs font-medium leading-5 rounded text-xs px-3 py-1.5 focus:outline-none">Search</button>
      </div>
    </form>
  </div>
</nav>

<section class=" mx-[450px] mt-[50px] relative rounded-3xl overflow-hidden bg-gradient-to-br from-stone-800 to-stone-900 border border-stone-700 ">
      <div class="absolute inset-0 opacity-15 " >
        <img src="../assets/Desain tanpa judul.png" alt="" class="w-full h-full object-cover">
      </div>
      <div class="relative px-8 py-20 md:px-16 max-w-2xl">
        <p class="text-[#4270ca] text-sm font-medium tracking-widest uppercase mb-4">Koleksi Terbaru</p>
        <h1 class="font-display text-5xl md:text-6xl font-extrabold leading-tight mb-6 text-stone-50">Temukan <span class="text-[#134cbd]">Produk</span> Terbaik</h1>
        <p class="text-stone-400 text-lg mb-8">Belanja nyaman, kualitas terjamin, pengiriman cepat ke seluruh nusantara.</p>
        <a href="#Product" class="cursor-pointer bg-[#4270ca] hover:bg-[#1a62f0] text-stone-950 font-display font-bold px-8 py-4 rounded-xl transition-all duration-200 hover:shadow-xl hover:shadow-[#4682f4] active:scale-[0.98]">
          BELANJA SEKARANG →
        </a>
      </div>
    </section>

<div class="flex justify-end mx-[450px] mt-6">
  <select id="filter-harga" onchange="filterProduk()" class="text-sm border border-gray-200 rounded-lg px-3 py-2 bg-white text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
    <option value="default">Urutkan</option>
    <option value="termahal">Harga: Tertinggi</option>
    <option value="termurah">Harga: Terendah</option>
  </select>
</div>

<!-- Filter Kategori (baru) -->
<div id="filter-kategori" class="flex gap-2 flex-wrap mx-[450px] mt-4">
  <button data-kategori="semua" onclick="pilihKategori(this)" 
    class="kategori-btn active text-xs px-4 py-1.5 rounded-full border border-blue-600 bg-blue-600 text-white transition">
    Semua
  </button>
</div>

<div class="gap-1 flex flex-row flex-wrap justify-center pt-10 mt-10 mx-[450px] border-t-2" id="Product">
  
</div>






<script src="../path/to/flowbite/dist/flowbite.min.js"></script>
<script src="../script/app.js"></script>
</body>
</html>
