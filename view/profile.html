<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/output.css">k
</head>
<body>
   <div class="max-w-[480px] mx-auto px-4 py-8">

    <!-- Avatar & Info -->
    <div class="flex flex-col items-center gap-3 mb-6">
      <div id="avatar-wrap" class="w-24 h-24 rounded-full border-2 border-gray-200 overflow-hidden bg-gray-100 flex items-center justify-center">
        <span id="avatar-initials" class="text-3xl font-medium text-gray-400">U</span>
      </div>
      <div class="text-center">
        <p id="user-name" class="text-lg font-semibold text-gray-900"></p>
        <p id="user-email" class="text-sm text-gray-400"></p>
      </div>
    </div>

   

    <!-- Card: Lainnya -->
    <div class="bg-white border border-gray-100 rounded-2xl overflow-hidden mb-3">
      <p class="text-[11px] font-medium text-gray-400 uppercase tracking-widest px-4 pt-3 pb-2 border-b border-gray-100">Lainnya</p>
      
      <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3.5 text-sm text-red-500 hover:bg-red-50 transition cursor-pointer">
        <i class="ti ti-logout text-lg"></i> Logout
      </button>
    </div>

    <p class="text-center text-xs text-gray-300 mt-4">TokoKu v1.0</p>
  </div>

<script src="../script/profile.js"></script>
</body>
</html>
