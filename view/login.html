<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../src/output.css">
</head>
<body>
    <div class="flex justify-center items-center min-h-screen ">

        <div class="bg-[#f2f3fb] flex flex-col w-[750px] h-[875px] justify-center items-center rounded-lg ">
            <!-- <p class="text-[1.5rem] pt-[161px] text-center mb-[100px]">MetroFlow</p> -->
            <img src="../assets/iems-removebg-preview.png" alt="" class="m-10 w-20 h-auto">
            <input class="mb-[10px] pl-[15.43px] border-1 rounded-[14px] border-black/25 w-[568px] h-[62px] placeholder:text-[14px] focus:border-none focus:outline-none focus:ring-4 focus:ring-[#0D498E]" type="email" placeholder="Email" id="email">
            <input class="mb-[20px] pl-[15.43px] border-1 rounded-[14px] border-black/25 w-[568px] h-[62px] placeholder:text-[14px] focus:border-none focus:outline-none focus:ring-4 focus:ring-[#0D498E]" type="password" placeholder="Password" id="password">
            <button class="cursor-pointer mb-[10px] bg-[#4270ca] rounded-[14px] w-[568px] h-[62px] text-[14px] text-white" onclick="login()">Login</button>
            <button class="cursor-pointer mb-[10px] bg-[#DEDEDE] border-1 rounded-[14px] border-black/25 w-[568px] h-[62px] text-[14px] text-[#000000]/52">Forgot Password</button>
            <div class="mb-[10px] flex flex-row self-center justify-between w-[568px]">
                <hr class="mt-3 w-[266px] border-1 border-[#595959]" />
                <p>or</p>
                <hr class="mt-3 w-[266px] border-1 border-[#595959]" />
            </div>
            <button class="border-1 rounded-[14px] border-black/25 w-[568px] h-[62px] justify-center items-center flex">
                <span class="icon-[material-icon-theme--google] h-[36px] w-[36px]" ></span>
            </button>
            <hr class="mt-[20px] w-[568px] border-1 border-[#595959]" />
            <p class="text-[14px] text-center">Don't Have an Account?<b><a href="signUp.html">Sign Up</a></b></p>
        </div>
    </div>
        
    <script src="../script/login.js"></script>
</body>
</html>
